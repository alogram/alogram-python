name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run a dry run (do not publish anywhere)'
        required: true
        default: 'true'
        type: boolean
      publish_to_testpypi:
        description: 'Publish to TestPyPI instead of production PyPI'
        required: true
        default: 'true'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Build package
        run: uv build
        
      - name: Publish to PyPI
        if: (github.event_name == 'release' || github.event.inputs.dry_run == 'false') && github.event.inputs.publish_to_testpypi == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Publish to TestPyPI
        if: github.event.inputs.dry_run == 'false' && github.event.inputs.publish_to_testpypi == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          
      - name: Dry Run Check
        if: github.event.inputs.dry_run == 'true'
        run: echo "🧪 [DRY RUN] Package built successfully. Skipping upload step."