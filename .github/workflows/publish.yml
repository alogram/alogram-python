name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run a dry run (do not publish to PyPI)'
        required: true
        default: 'true'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Build package
        run: uv build
        
      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          
      - name: Dry Run Check
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: echo "🧪 [DRY RUN] Package built successfully. Would have published to PyPI."