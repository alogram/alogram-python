# Alogram Python SDK Publish Workflow
# This workflow is mirrored from the Core Services Hub.
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-test:
    name: Publish to Test PyPI
    needs: build
    # Trigger if it's a tag with -rc OR if manually triggered for testpypi
    if: |
      (github.event_name == 'push' && contains(github.ref, '-rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/alogram-payrisk
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-prod:
    name: Publish to PyPI
    needs: build
    # Trigger if it's a tag WITHOUT -rc OR if manually triggered for pypi
    if: |
      (github.event_name == 'push' && !contains(github.ref, '-rc') && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/alogram-payrisk
    permissions:
      id-token: write # Required for Trusted Publishing
    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
